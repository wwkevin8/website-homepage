<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码重置 | Nottingham Good Neighbor</title>
  <meta
    name="description"
    content="Request a password reset email or set a new password for your NGN account."
    data-i18n-content="metaDescription"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page-shell auth-page-shell" data-reset-page data-reset-mode="request">
    <section class="storage-section auth-page-section">
      <div class="auth-page-tools">
        <div class="lang-switch" aria-label="language switch">
          <button class="lang-btn" type="button" data-auth-lang="zh-CN">中</button>
          <button class="lang-btn" type="button" data-auth-lang="en">EN</button>
        </div>
      </div>

      <div class="auth-hero-panel">
        <p class="eyebrow" data-i18n="heroEyebrow">账号帮助</p>
        <h1 data-i18n="heroTitle">忘记密码也没关系，我们会通过邮箱帮你重新设置。</h1>
        <p class="auth-hero-text" data-i18n="heroText">
          你可以先提交邮箱并完成人机校验，我们会发送一封带重置链接的邮件。点击链接后设置新密码，就可以重新登录你的 NGN 账号。
        </p>
        <figure class="auth-team-photo">
          <img src="./img/团队照片.jpg" alt="NGN team photo">
        </figure>
      </div>

      <div class="calculator-card auth-card">
        <div class="auth-card-header">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="cardEyebrow">密码重置</p>
            <h2 data-reset-title data-i18n="requestTitle">发送重置邮件</h2>
            <p data-reset-text data-i18n="requestText">输入邮箱并完成人机校验，我们会发送一封重置密码邮件。</p>
          </div>
        </div>

        <div class="auth-form auth-form-stack" data-reset-request>
          <label class="auth-field-group">
            <span data-i18n="emailLabel">邮箱地址</span>
            <input
              class="transport-form-input"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              data-reset-email
              data-i18n-placeholder="emailPlaceholder"
            >
          </label>

          <div class="auth-turnstile-block">
            <span class="auth-turnstile-label" data-i18n="turnstileLabel">发送前请先手动完成人机校验</span>
            <div class="auth-turnstile-slot" data-turnstile-slot></div>
            <div class="auth-turnstile-actions">
              <button class="button button-secondary auth-verify-button" type="button" data-turnstile-verify data-i18n="verifyHumanIdle">
                点击进行人机验证
              </button>
              <span class="auth-turnstile-status" data-turnstile-status data-i18n="humanNotVerified">尚未完成人机校验</span>
            </div>
          </div>

          <p class="transport-form-message" id="resetMessage"></p>
          <a href="./register.html" class="auth-inline-link" data-reset-register-link hidden data-i18n="goRegister">没有账号？去注册</a>

          <button class="button button-primary auth-submit" type="button" data-reset-request-submit data-i18n="requestIdle">
            发送重置邮件
          </button>

          <div class="auth-link-row auth-link-row-stack">
            <a href="./login.html" class="auth-inline-link" data-i18n="goLogin">返回登录</a>
            <a class="button button-secondary auth-back-link" href="./index.html" data-i18n="backHome">返回首页</a>
          </div>

          <div class="auth-policy-row">
            <a href="./privacy-policy.html" class="auth-inline-link" data-i18n="privacyPolicy">《隐私政策》</a>
          </div>
        </div>

        <div class="auth-form auth-form-stack" data-reset-complete hidden>
          <label class="auth-field-group">
            <span data-i18n="passwordLabel">新密码</span>
            <input
              class="transport-form-input"
              type="password"
              autocomplete="new-password"
              placeholder="至少 8 位密码"
              data-new-password
              data-i18n-placeholder="passwordPlaceholder"
            >
          </label>

          <label class="auth-field-group">
            <span data-i18n="confirmPasswordLabel">确认新密码</span>
            <input
              class="transport-form-input"
              type="password"
              autocomplete="new-password"
              placeholder="再次输入密码"
              data-confirm-password
              data-i18n-placeholder="confirmPasswordPlaceholder"
            >
          </label>

          <p class="transport-form-message" id="resetCompleteMessage"></p>

          <button class="button button-primary auth-submit" type="button" data-reset-complete-submit data-i18n="resetIdle">
            设置新密码
          </button>
          <div class="auth-link-row auth-link-row-stack">
            <a href="./login.html" class="auth-inline-link" data-i18n="goLogin">返回登录</a>
          </div>
          <div class="auth-policy-row">
            <a href="./privacy-policy.html" class="auth-inline-link" data-i18n="privacyPolicy">《隐私政策》</a>
          </div>
        </div>

        <section class="auth-state-card">
          <h3 data-i18n="statusTitle">安全说明</h3>
          <p data-i18n="statusText">重置链接是一次性的，且有有效期。设置新密码后，你可以直接重新登录。</p>
        </section>
      </div>
    </section>
  </main>
