<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建拼车组</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page-shell transport-admin-shell" id="transportGroupFormPage">
    <section class="storage-section">
      <div class="transport-admin-header">
        <div class="section-heading">
          <p class="eyebrow">New Group</p>
          <h1>新建拼车组</h1>
          <p>先建立 group 基本信息，保存后再在编辑页分配成员。</p>
        </div>
        <div class="transport-admin-nav">
          <a class="button button-secondary" href="./transport-admin-groups.html">返回拼车组列表</a>
          <a class="button button-secondary" href="./transport-admin-requests.html">需求列表</a>
          <button class="button button-secondary" type="button" data-transport-logout>退出登录</button>
        </div>
      </div>

      <form class="calculator-card transport-form-grid" id="transportGroupForm">
        <label class="field">
          <span>服务类型</span>
          <select name="service_type">
            <option value="pickup">接机</option>
            <option value="dropoff">送机</option>
          </select>
        </label>
        <label class="field">
          <span>组日期</span>
          <input type="date" name="group_date">
        </label>
        <label class="field">
          <span>机场代码</span>
          <select name="airport_code"></select>
        </label>
        <label class="field">
          <span>机场名称</span>
          <input type="text" name="airport_name" readonly required>
        </label>
        <label class="field">
          <span>航站楼</span>
          <input type="text" name="terminal">
        </label>
        <label class="field">
          <span>起点</span>
          <input type="text" name="location_from" required>
        </label>
        <label class="field">
          <span>终点</span>
          <input type="text" name="location_to" required>
        </label>
        <label class="field">
          <span>航班时间参考</span>
          <input type="datetime-local" name="flight_time_reference">
        </label>
        <label class="field">
          <span>期待开始时间</span>
          <input type="datetime-local" name="preferred_time_start">
        </label>
        <label class="field">
          <span>期待结束时间</span>
          <input type="datetime-local" name="preferred_time_end">
        </label>
        <label class="field">
          <span>车型</span>
          <input type="text" name="vehicle_type" placeholder="例如：4-seat car / 6-seat MPV">
        </label>
        <label class="field">
          <span>最大人数</span>
          <input type="number" name="max_passengers" min="1" value="4" required>
        </label>
        <label class="field">
          <span>前台显示</span>
          <select name="visible_on_frontend">
            <option value="false">隐藏</option>
            <option value="true">显示</option>
          </select>
        </label>
        <label class="field">
          <span>状态</span>
          <select name="status">
            <option value="draft">草稿</option>
            <option value="open">开放中</option>
            <option value="full">已满员</option>
            <option value="closed">已关闭</option>
            <option value="cancelled">已取消</option>
          </select>
        </label>
        <label class="field transport-field-span-2">
          <span>备注</span>
          <textarea name="notes" rows="4"></textarea>
        </label>
        <p class="transport-form-message transport-field-span-2" id="transportGroupMessage"></p>
        <div class="transport-card-actions transport-field-span-2">
          <button class="button button-primary" type="submit">保存拼车组</button>
        </div>
      </form>

      <section class="calculator-card" id="transportGroupMembersPanel" hidden>
        <h2>成员分配</h2>
        <p>新建完成后会跳转到编辑页，在那里勾选和移除成员。</p>
        <div id="transportGroupMembersList"></div>
        <div class="transport-card-actions">
          <button class="button button-secondary" id="transportGroupSaveMembersButton" type="button">保存成员</button>
        </div>
      </section>
    </section>
  </main>
  <script src="./transport-shared.js"></script>
  <script src="./transport-api.js"></script>
  <script src="./transport-admin.js"></script>
</body>
</html>
