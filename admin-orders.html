<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单中心 | NGN 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body
  data-admin-shell
  data-admin-page="orders"
  data-admin-section="运营后台"
  data-admin-title="订单中心"
  data-admin-description="统一查看接送机、寄存等订单，支持分页、搜索、筛选、归档和操作追踪。"
>
  <div class="admin-layout">
    <aside class="admin-sidebar" data-admin-sidebar></aside>
    <div class="admin-main">
      <header class="admin-header" data-admin-header></header>
      <main class="admin-content" data-admin-content>
        <section class="admin-page" id="adminOrdersPage">
          <section class="admin-panel">
            <div class="admin-toolbar admin-toolbar-split">
              <form class="admin-toolbar admin-toolbar-inline" id="adminOrdersFilters">
                <input type="hidden" name="archived" value="active">
                <label class="field">
                  <span>订单编号</span>
                  <input type="text" name="order_no" placeholder="例如 PU260411-0001">
                </label>
                <label class="field">
                  <span>姓名</span>
                  <input type="text" name="customer_name" placeholder="按客户姓名搜索">
                </label>
                <label class="field">
                  <span>手机号</span>
                  <input type="text" name="phone" placeholder="按手机号搜索">
                </label>
                <label class="field">
                  <span>服务类型</span>
                  <select name="service_type">
                    <option value="">全部</option>
                    <option value="pickup">接机</option>
                    <option value="dropoff">送机</option>
                    <option value="storage">寄存</option>
                  </select>
                </label>
                <label class="field">
                  <span>订单状态</span>
                  <select name="status">
                    <option value="">全部</option>
                    <option value="pending_confirmation">待确认</option>
                    <option value="confirmed">已确认</option>
                    <option value="draft">草稿</option>
                    <option value="open">进行中</option>
                    <option value="grouped">已拼单</option>
                    <option value="closed">已完成</option>
                    <option value="cancelled">已取消</option>
                  </select>
                </label>
                <label class="field">
                  <span>开始时间</span>
                  <input type="date" name="created_from">
                </label>
                <label class="field">
                  <span>结束时间</span>
                  <input type="date" name="created_to">
                </label>
                <label class="field">
                  <span>排序</span>
                  <select name="sort">
                    <option value="latest">最新</option>
                    <option value="oldest">最旧</option>
                  </select>
                </label>
                <label class="field">
                  <span>每页</span>
                  <select name="page_size">
                    <option value="10">10</option>
                  </select>
                </label>
                <div class="admin-inline-actions">
                  <button class="button button-primary" type="submit">查询</button>
                  <button class="button button-secondary" type="reset">重置</button>
                </div>
              </form>
              <div class="admin-inline-actions">
                <button class="button button-secondary" type="button" data-orders-archive-run="6">归档 6 个月前已完成</button>
                <button class="button button-secondary" type="button" data-orders-archive-run="12">归档 12 个月前已完成</button>
              </div>
            </div>
            <div class="admin-segmented-control" id="adminOrdersTabs">
              <button class="button button-secondary is-active" type="button" data-orders-tab="active">活跃订单</button>
              <button class="button button-secondary" type="button" data-orders-tab="archived">历史订单</button>
            </div>
            <p class="transport-form-message" id="adminOrdersMessage"></p>
          </section>
          <section id="adminOrdersList"></section>
          <div class="transport-pagination" id="adminOrdersPagination"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="admin-overlay" id="adminOrderDrawer" hidden>
    <div class="admin-drawer admin-panel admin-order-drawer">
      <div class="admin-drawer-header">
        <div>
          <h2 id="adminOrderDrawerTitle">订单详情</h2>
          <p id="adminOrderDrawerNote">这里只展示订单基础信息，以及后台管理员改过哪些内容。</p>
        </div>
        <button class="button button-secondary" type="button" data-admin-order-drawer-close>关闭</button>
      </div>
      <div class="admin-drawer-body">
        <div class="admin-detail-grid" id="adminOrderDetailGrid"></div>

        <section class="admin-detail-section">
          <h3>管理员修改记录</h3>
          <p class="admin-table-note">只显示哪个管理员改过这笔订单，以及具体改动了哪些字段。</p>
          <div class="admin-log-list" id="adminOrderOperationLogs"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="./admin-api.js"></script>
  <script src="./admin-shell.js"></script>
  <script src="./admin-orders.js"></script>
</body>
</html>
