<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接送机调度后台登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page-shell transport-admin-shell">
    <section class="storage-section transport-auth-wrap">
      <div class="section-heading">
        <p class="eyebrow">Transport Admin</p>
        <h1>接送机调度后台登录</h1>
        <p>请输入后台共享密码，进入需求管理与拼车调度页面。</p>
      </div>
      <form class="calculator-card transport-auth-card" id="transportAdminLoginForm">
        <label class="field">
          <span>后台密码</span>
          <input type="password" name="password" placeholder="请输入管理员密码" required>
        </label>
        <p class="transport-form-message" id="transportAdminLoginMessage"></p>
        <button class="button button-primary" type="submit">登录后台</button>
      </form>
    </section>
  </main>
  <script src="./transport-shared.js"></script>
  <script src="./transport-api.js"></script>
  <script src="./transport-admin.js"></script>
</body>
</html>
