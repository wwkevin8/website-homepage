<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登记接送机订单 | NGN 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body
  data-admin-shell
  data-admin-page="transport-forms"
  data-admin-section="运营后台"
  data-admin-title="登记接送机订单"
  data-admin-description="人工录入个人接送机订单，保存后会自动生成对应 group_id。"
>
  <div class="admin-layout">
    <aside class="admin-sidebar" data-admin-sidebar></aside>
    <div class="admin-main">
      <header class="admin-header" data-admin-header></header>
      <main class="admin-content" data-admin-content>
        <section class="admin-page" id="transportRequestFormPage">
          <div class="admin-page-actions">
            <a class="button button-secondary" href="./transport-admin-requests.html">返回登记接送机订单</a>
            <a class="button button-secondary" href="./transport-admin-groups.html">查看拼车组管理</a>
          </div>
          <form class="admin-panel transport-form-grid" id="transportRequestForm">
            <label class="field"><span>服务类型</span><select name="service_type"><option value="pickup">接机</option><option value="dropoff">送机</option></select></label>
            <label class="field"><span>提交人姓名</span><input type="text" name="student_name" required></label>
            <label class="field"><span>手机号</span><input type="text" name="phone"></label>
            <label class="field"><span>微信号</span><input type="text" name="wechat"></label>
            <input type="hidden" name="passenger_count" value="1">
            <label class="field transport-field-span-2"><span>登记人数</span><input type="text" value="每单固定 1 人；若还有同行人，需要创建账号并分别填写。" readonly></label>
            <label class="field"><span>行李件数</span><input type="number" name="luggage_count" min="0" value="0" required></label>
            <label class="field"><span>目标机场</span><select name="airport_code"></select></label>
            <label class="field"><span>机场名称</span><input type="text" name="airport_name" readonly required></label>
            <label class="field"><span data-terminal-label>航站楼</span><input type="text" name="terminal"></label>
            <label class="field"><span data-flight-datetime-label>航班时间</span><input type="datetime-local" name="flight_datetime" required></label>
            <label class="field"><span>航班号</span><input type="text" name="flight_no"></label>
            <label class="field"><span>出发地点</span><input type="text" name="location_from" required></label>
            <label class="field"><span>目标地址</span><input type="text" name="location_to" required></label>
            <label class="field"><span>可服务开始时间</span><input type="datetime-local" name="preferred_time_start"></label>
            <label class="field"><span>可服务结束时间</span><input type="datetime-local" name="preferred_time_end"></label>
            <label class="field transport-checkbox-field"><span>允许拼车</span><input type="checkbox" name="shareable" checked></label>
            <label class="field"><span>服务状态</span><select name="status"><option value="published">已发布</option><option value="matched">已跟进</option><option value="closed">已关闭</option></select></label>
            <label class="field transport-field-span-2"><span>备注</span><textarea name="notes" rows="4"></textarea></label>
            <p class="transport-form-message transport-field-span-2" id="transportRequestMessage"></p>
            <div class="transport-card-actions transport-field-span-2"><button class="button button-primary" type="submit">保存订单</button></div>
          </form>
          <section class="admin-panel" id="transportRequestAssignSection" hidden>
            <h2>匹配到拼车组</h2>
            <p>订单保存后，可在这里快速加入符合条件的拼车组。</p>
            <div class="transport-inline-actions"><select id="transportRequestGroupSelect"><option value="">请选择拼车组</option></select><button class="button button-secondary" id="transportRequestAssignButton" type="button">加入该拼车组</button></div>
          </section>
        </section>
      </main>
    </div>
  </div>
  <script src="./admin-api.js"></script>
  <script src="./admin-shell.js"></script>
  <script src="./transport-shared.js"></script>
  <script src="./transport-api.js"></script>
  <script src="./transport-admin.js"></script>
</body>
</html>
