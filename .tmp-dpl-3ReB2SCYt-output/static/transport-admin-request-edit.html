<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑接送机订单 | NGN 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body
  data-admin-shell
  data-admin-page="transport-forms"
  data-admin-section="运营后台"
  data-admin-title="编辑接送机订单"
  data-admin-description="按 order_no 管理个人订单；如需查看拼车关系，请进入拼车组管理。"
>
  <div class="admin-layout">
    <aside class="admin-sidebar" data-admin-sidebar></aside>
    <div class="admin-main">
      <header class="admin-header" data-admin-header></header>
      <main class="admin-content" data-admin-content>
        <section class="admin-page" id="transportRequestFormPage">
          <div class="admin-page-actions">
            <a class="button button-secondary" href="./transport-admin-requests.html">返回登记接送机订单</a>
            <a class="button button-secondary" href="./transport-admin-groups.html">进入拼车组管理</a>
          </div>
          <form class="admin-panel transport-form-grid" id="transportRequestForm">
            <label class="field"><span>服务类型</span><select name="service_type"><option value="pickup">接机</option><option value="dropoff">送机</option></select></label>
            <label class="field"><span>姓名</span><input type="text" name="student_name" required></label>
            <label class="field transport-field-span-2"><span>邮箱</span><input type="text" name="student_email"></label>
            <label class="field"><span>手机号</span><input type="text" name="phone"></label>
            <label class="field"><span>微信号</span><input type="text" name="wechat"></label>
            <input type="hidden" name="passenger_count" value="1">
            <label class="field transport-field-span-2"><span>登记人数</span><input type="text" value="每单固定 1 人；若还有同行人，需要创建账号并分别填写。" readonly></label>
            <fieldset class="carpool-choice-group transport-field-span-2" id="transportRequestLuggageGroup">
              <legend>行李数量</legend>
              <p class="carpool-inline-hint" id="transportRequestLuggageHint">已选择 0 项，最多 2 项。</p>
              <label><input type="checkbox" name="luggage_option" value="1big1small-box-cabin"> 1 大 1 小：托运箱 + 登机箱</label>
              <label><input type="checkbox" name="luggage_option" value="1big1small-box-backpack"> 1 大 1 小：托运箱 + 大背包</label>
              <label><input type="checkbox" name="luggage_option" value="2big1small-box-cabin"> 2 大 1 小：双托运箱 + 登机箱</label>
              <label><input type="checkbox" name="luggage_option" value="2big1small-box-backpack"> 2 大 1 小：双托运箱 + 大背包</label>
              <label><input type="checkbox" name="luggage_option" value="3big1small-box-backpack"> 3 大 1 小：三托运箱 + 大背包</label>
              <label><input type="checkbox" name="luggage_option" value="other"> 其他</label>
              <label class="field carpool-inline-field" id="transportRequestLuggageOtherField" hidden>
                <span>其他行李说明</span>
                <input type="text" name="luggage_other" placeholder="请补充说明">
              </label>
            </fieldset>
            <label class="field"><span>机场代码</span><select name="airport_code"></select></label>
            <label class="field"><span>机场名称</span><input type="text" name="airport_name" readonly required></label>
            <label class="field"><span data-terminal-label>航站楼</span><input type="text" name="terminal"></label>
            <label class="field"><span>航班号</span><input type="text" name="flight_no"></label>
            <label class="field"><span data-flight-datetime-label>航班时间</span><input type="datetime-local" name="flight_datetime" required></label>
            <label class="field"><span>出发地</span><input type="text" name="location_from" required></label>
            <label class="field"><span>目的地地址</span><input type="text" name="location_to" required></label>
            <label class="field transport-field-span-2"><span>接机时间</span><input type="datetime-local" name="preferred_time_start"></label>
            <label class="field transport-field-span-2"><span>备注</span><textarea name="notes" rows="4"></textarea></label>
            <label class="field transport-field-span-2"><span>内部备注</span><textarea name="admin_note" rows="3"></textarea></label>
            <p class="transport-form-message transport-field-span-2" id="transportRequestMessage"></p>
            <div class="transport-card-actions transport-field-span-2">
              <button class="button button-primary" type="submit">保存订单</button>
            </div>
          </form>
          <section class="admin-panel" id="transportRequestAssignSection" hidden>
            <h2>更换现有拼车组</h2>
            <p id="transportRequestAssignHint">可将该订单更换到目标拼车组，系统会自动退出原拼车组，确保一单仅属于一个拼车组。</p>
            <div class="transport-inline-actions"><select id="transportRequestGroupSelect"><option value="">请选择目标拼车组</option></select><button class="button button-secondary" id="transportRequestAssignButton" type="button">更换到该拼车组</button></div>
            <form class="transport-inline-actions transport-force-assign" id="transportRequestForceAssignForm">
              <label class="field transport-quick-jump-field">
                <span>按 Group ID 强制更换</span>
                <input type="text" name="source_order_no" placeholder="输入目标 Group ID" autocomplete="off">
              </label>
              <div class="admin-inline-actions">
                <button class="button button-secondary" type="submit">执行更换</button>
              </div>
            </form>
            <div class="transport-assign-list" id="transportRequestAssignableGroups"></div>
          </section>
        </section>
      </main>
    </div>
  </div>
  <script src="./admin-api.js"></script>
  <script src="./admin-shell.js"></script>
  <script src="./transport-shared.js"></script>
  <script src="./transport-api.js"></script>
  <script src="./transport-admin.js"></script>
</body>
</html>
