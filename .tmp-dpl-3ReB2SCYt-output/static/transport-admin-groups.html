<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼车组管理 | NGN 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260416-group-row-colors">
</head>
<body
  data-admin-shell
  data-admin-page="transport-orders"
  data-admin-section="运营后台"
  data-admin-title="拼车组管理"
  data-admin-description="按 group_id 管理整组拼车关系，并查看组内成员详情。"
>
  <div class="admin-layout">
    <aside class="admin-sidebar" data-admin-sidebar></aside>
    <div class="admin-main">
      <header class="admin-header" data-admin-header></header>
      <main class="admin-content" data-admin-content>
        <section class="admin-page" id="transportGroupsPage">
          <section class="admin-panel">
            <div class="admin-toolbar admin-toolbar-split transport-groups-toolbar">
              <form class="admin-toolbar transport-group-filters" id="transportGroupFilters">
                <div class="transport-group-filters-main">
                  <label class="field">
                    <span>服务类型</span>
                    <select name="service_type">
                      <option value="">全部</option>
                      <option value="pickup">接机</option>
                      <option value="dropoff">送机</option>
                    </select>
                  </label>
                  <label class="field">
                    <span>机场</span>
                    <select name="airport_code">
                      <option value="">全部机场</option>
                    </select>
                  </label>
                  <label class="field">
                    <span>组状态</span>
                    <select name="status">
                      <option value="">全部</option>
                      <option value="single_member">待拼车</option>
                      <option value="active">已成组</option>
                      <option value="full">已拼满</option>
                      <option value="closed">已关闭</option>
                    </select>
                  </label>
                  <label class="field">
                    <span>前台展示</span>
                    <select name="visible_on_frontend">
                      <option value="">全部</option>
                      <option value="true">已展示</option>
                      <option value="false">未展示</option>
                    </select>
                  </label>
                </div>
                <div class="transport-group-filters-side">
                  <label class="field">
                    <span>按订单编号或 Group ID 搜索</span>
                    <input type="text" name="order_no" placeholder="例如 PU260411-0001 或 GRP-260416-QM2A" autocomplete="off">
                  </label>
                  <label class="field">
                    <span>开始日期</span>
                    <input type="date" name="date_from">
                  </label>
                  <label class="field">
                    <span>结束日期</span>
                    <input type="date" name="date_to">
                  </label>
                  <div class="admin-inline-actions transport-group-filter-actions">
                    <button class="button button-primary" type="submit">筛选</button>
                    <button class="button button-secondary" type="reset">重置</button>
                  </div>
                </div>
              </form>
            </div>
            <p class="transport-form-message" id="transportGroupQuickJumpMessage"></p>
          </section>
          <section id="transportGroupsList"></section>
          <div class="transport-pagination" id="transportGroupsPagination"></div>
        </section>
      </main>
    </div>
  </div>
  <script src="./admin-api.js?v=20260416-group-row-colors"></script>
  <script src="./admin-shell.js?v=20260416-group-row-colors"></script>
  <script src="./transport-shared.js?v=20260416-group-row-colors"></script>
  <script src="./transport-api.js?v=20260416-group-row-colors"></script>
  <script src="./transport-admin.js?v=20260416-group-row-colors"></script>
</body>
</html>
