<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登记接送机订单 | NGN 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body
  data-admin-shell
  data-admin-page="transport-forms"
  data-admin-section="运营后台"
  data-admin-title="登记接送机订单"
  data-admin-description="按 order_no 管理个人接送机订单，并可查看所属拼车组。"
>
  <div class="admin-layout">
    <aside class="admin-sidebar" data-admin-sidebar></aside>
    <div class="admin-main">
      <header class="admin-header" data-admin-header></header>
      <main class="admin-content" data-admin-content>
        <section class="admin-page" id="transportRequestsPage">
          <section class="admin-panel">
            <div class="admin-toolbar admin-toolbar-split">
              <form class="admin-toolbar admin-toolbar-inline" id="transportRequestFilters">
                <label class="field">
                  <span>订单编号</span>
                  <input type="text" name="order_no" placeholder="例如 PU260411-0001">
                </label>
                <label class="field">
                  <span>服务类型</span>
                  <select name="service_type">
                    <option value="">全部</option>
                    <option value="pickup">接机</option>
                    <option value="dropoff">送机</option>
                  </select>
                </label>
                <label class="field">
                  <span>机场</span>
                  <select name="airport_code">
                    <option value="">全部机场</option>
                  </select>
                </label>
                <label class="field">
                  <span>订单状态</span>
                  <select name="status">
                    <option value="">全部</option>
                    <option value="active" selected>有效单</option>
                    <option value="expired">过期单</option>
                  </select>
                </label>
                <label class="field">
                  <span>开始日期</span>
                  <input type="date" name="date_from">
                </label>
                <label class="field">
                  <span>结束日期</span>
                  <input type="date" name="date_to">
                </label>
                <label class="field">
                  <span>排序</span>
                  <select name="sort">
                    <option value="submitted_latest" selected>按提交时间：最近到最远</option>
                    <option value="submitted_oldest">按提交时间：最远到最近</option>
                    <option value="flight_nearest">按抵达/起飞：最近到最久</option>
                    <option value="flight_latest">按抵达/起飞：最久到最近</option>
                  </select>
                </label>
                <div class="admin-inline-actions">
                  <button class="button button-primary" type="submit">查询</button>
                  <button class="button button-secondary" type="reset">重置</button>
                </div>
              </form>
              <div class="admin-inline-actions">
                <button class="button button-primary" type="button" id="transportRequestsExport">导出 Excel</button>
                <a class="button button-secondary" href="./transport-admin-groups.html">拼车组管理</a>
              </div>
            </div>
            <p class="transport-form-message" id="transportRequestsMessage"></p>
          </section>
          <section id="transportRequestsList"></section>
          <div class="transport-pagination" id="transportRequestsPagination"></div>
        </section>
      </main>
    </div>
  </div>
  <script src="./admin-api.js"></script>
  <script src="./admin-shell.js"></script>
  <script src="./transport-shared.js"></script>
  <script src="./transport-api.js"></script>
  <script src="./transport-admin.js"></script>
</body>
</html>
