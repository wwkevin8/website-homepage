<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号登录 | Nottingham Good Neighbor</title>
  <meta
    name="description"
    content="Sign in to your NGN account with your email and password."
    data-i18n-content="metaDescription"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page-shell auth-page-shell" data-login-page>
    <section class="storage-section auth-page-section">
      <div class="auth-page-tools">
        <div class="lang-switch" aria-label="language switch">
          <button class="lang-btn" type="button" data-auth-lang="zh-CN">中</button>
          <button class="lang-btn" type="button" data-auth-lang="en">EN</button>
        </div>
      </div>

      <div class="auth-hero-panel">
        <p class="eyebrow" data-i18n="heroEyebrow">关于 NGN</p>
        <h1 data-i18n="heroTitle">面向来到英国留学生的租房与落地生活服务平台。</h1>
        <p class="auth-hero-text" data-i18n="heroText">
          NGN 从最初帮助身边同学解决找房、接机和入住沟通开始，逐步发展成一个陪伴留学生落地英国生活的本地团队。我们希望每一位来到英国的同学，在登录账户时也能感受到认真、清楚和被接住的体验。
        </p>
        <figure class="auth-team-photo auth-team-photo-brand">
          <img src="./img/company-name.jpg" alt="NGN company photo">
        </figure>
      </div>

      <div class="calculator-card auth-card">
        <div class="auth-card-header">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="cardEyebrow">账号访问</p>
            <h2 data-i18n="cardTitle">已有账号登录</h2>
            <p data-i18n="cardText">使用邮箱和密码登录你的 NGN 账号。</p>
          </div>
        </div>

        <div class="auth-form auth-form-stack">
          <label class="auth-field-group">
            <span data-i18n="emailLabel">邮箱地址</span>
            <input
              class="transport-form-input"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              data-login-email
              data-i18n-placeholder="emailPlaceholder"
            >
          </label>

          <label class="auth-field-group">
            <span data-i18n="passwordLabel">密码</span>
            <input
              class="transport-form-input"
              type="password"
              autocomplete="current-password"
              placeholder="请输入密码"
              data-login-password
              data-i18n-placeholder="passwordPlaceholder"
            >
          </label>

          <div class="auth-turnstile-block">
            <span class="auth-turnstile-label" data-i18n="turnstileLabel">登录前请先手动完成人机校验</span>
            <div class="auth-turnstile-slot" data-turnstile-slot></div>
            <div class="auth-turnstile-actions">
              <button class="button button-secondary auth-verify-button" type="button" data-turnstile-verify data-i18n="verifyHumanIdle">
                点击进行人机验证
              </button>
              <span class="auth-turnstile-status" data-turnstile-status data-i18n="humanNotVerified">尚未完成人机校验</span>
            </div>
          </div>

          <div class="auth-link-row">
            <a href="./reset-password.html" class="auth-inline-link" data-i18n="forgotPassword">忘记密码</a>
            <a href="./register.html" class="auth-inline-link" data-i18n="goRegister">没有账号？去注册</a>
          </div>

          <p class="transport-form-message" id="loginMessage"></p>

          <button class="button button-primary auth-submit" type="button" data-login-submit data-i18n="loginIdle">
            登录
          </button>
          <a class="button button-secondary auth-back-link" href="./index.html" data-i18n="backHome">返回首页</a>
          <div class="auth-policy-row">
            <a href="./privacy-policy.html" class="auth-inline-link" data-i18n="privacyPolicy">《隐私政策》</a>
          </div>
        </div>

        <section class="auth-state-card">
          <h3 data-i18n="statusTitle">当前账号方式</h3>
          <p data-i18n="statusText">已有账号默认使用邮箱和密码登录；新账号需要先验证邮箱，再设置密码后创建。</p>
        </section>
      </div>
    </section>
  </main>

  <script src="./auth-i18n.js"></script>
  <script src="./site-auth.js"></script>
  <script src="./login.js"></script>
</body>
</html>
