<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>接送机拼车看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css?v=20260416-transport-groups-unified">
</head>
<body>
  <div class="topbar topbar-transport-board">
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="返回首页">
        <div class="brand-lockup brand-lockup-header">
          <div class="logo-bubbles">
            <span>英国 · 诺丁汉</span>
            <span>左邻右里</span>
            <span>生活服务</span>
          </div>
          <div class="logo-wordmark">NGN</div>
          <div class="logo-subtitle">NOTTINGHAM GOOD NEIGHBOR</div>
        </div>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a class="nav-link nav-link-secondary" href="./index.html">首页</a>
        <a class="nav-link nav-link-secondary" href="./pickup.html">接送机服务</a>
        <a class="nav-link nav-link-accent" href="./transport-board.html">拼车看板</a>
      </nav>
      <div class="site-auth-nav" data-site-auth-nav></div>
    </header>
  </div>

  <main class="page-shell transport-board-shell">
    <section class="storage-section">
      <div class="section-heading">
        <p class="eyebrow">Transport Board</p>
        <h1>最新接送机拼车信息</h1>
        <p>公开展示仍然以订单表为主数据源。卡片公开编号显示 group_id，加入拼车会先做自动校验，再决定是否可直接入组。</p>
      </div>

      <div class="transport-board-cta-strip">
        <div class="transport-board-cta-copy">
          <p class="transport-board-cta-kicker">NO MATCH?</p>
          <h2>没有合适时间？优先发起拼车</h2>
          <p>先浏览完整拼车表格；如果当前没有适合你的时间或机场，直接发起新的拼车需求，我们会继续为你匹配同行人。</p>
        </div>
        <div class="transport-board-cta-actions">
          <a class="button button-primary transport-board-cta-primary" href="./pickup-form.html" data-requires-login data-login-alert-message="请先登录">
            <span>没有合适时间，我要发起拼车</span>
            <span class="transport-board-cta-arrow" aria-hidden="true">→</span>
          </a>
          <a class="button button-secondary transport-board-cta-secondary" href="./pickup.html">返回接机页查看说明</a>
        </div>
      </div>

      <form class="calculator-card transport-filter-form" id="transportBoardFilters">
        <label class="field">
          <span>搜索拼车组编号</span>
          <input type="text" name="group_id" placeholder="例如 GRP-260413-022B">
        </label>
        <label class="field">
          <span>服务类型</span>
          <select name="service_type">
            <option value="">全部</option>
            <option value="pickup">接机</option>
            <option value="dropoff">送机</option>
          </select>
        </label>
        <label class="field">
          <span>机场代码</span>
          <select name="airport_code">
            <option value="">全部机场</option>
          </select>
        </label>
        <label class="field">
          <span>开始日期</span>
          <input type="date" name="date_from">
        </label>
        <label class="field">
          <span>结束日期</span>
          <input type="date" name="date_to">
        </label>
        <button class="button button-primary" type="submit">筛选</button>
      </form>

      <div class="transport-list-grid" id="transportBoardList"></div>
      <div class="transport-pagination" id="transportBoardPagination"></div>
    </section>
  </main>

  <script src="./site-auth.js?v=20260416-transport-board-auth-1"></script>
  <script src="./transport-shared.js?v=20260416-transport-groups-unified"></script>
  <script src="./transport-api.js?v=20260416-transport-groups-unified"></script>
  <script src="./transport-public.js?v=20260416-transport-board-auth-1"></script>
</body>
</html>
