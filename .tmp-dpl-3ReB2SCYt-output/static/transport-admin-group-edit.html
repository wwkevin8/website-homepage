<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拼车组详情 | NGN 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body
  data-admin-shell
  data-admin-page="transport-orders"
  data-admin-section="运营后台"
  data-admin-title="拼车组详情"
  data-admin-description="按 group_id 查看组概要、费用与付款、加入成员和组内成员。"
>
  <div class="admin-layout">
    <aside class="admin-sidebar" data-admin-sidebar></aside>
    <div class="admin-main">
      <header class="admin-header" data-admin-header></header>
      <main class="admin-content" data-admin-content>
        <section class="admin-page" id="transportGroupFormPage">
          <div class="admin-page-actions">
            <a class="button button-secondary" href="./transport-admin-groups.html">返回拼车组管理</a>
            <a class="button button-secondary" href="./transport-admin-requests.html">查看登记接送机订单</a>
          </div>

          <p class="transport-form-message" id="transportGroupMessage"></p>

          <section class="admin-panel transport-group-detail-panel" id="transportGroupSummaryPanel">
            <div class="transport-panel-header">
              <div>
                <h2>组概要</h2>
                <p>这里展示当前拼车组的关键信息，可直接修改接机时间和最大人数。</p>
              </div>
            </div>
            <div class="transport-group-summary-grid" id="transportGroupSummaryGrid"></div>
          </section>

          <section class="admin-panel transport-group-detail-panel" id="transportGroupJudgementPanel">
            <div class="transport-panel-header">
              <div>
                <h2>费用与付款</h2>
                <p>这里显示总价、人均金额，以及组内成员的付款状态。</p>
              </div>
            </div>
            <div class="transport-group-judgement-grid" id="transportGroupJudgementGrid"></div>
            <div class="transport-group-reasons" id="transportGroupBlockingReasons"></div>
          </section>

          <section class="admin-panel" id="transportGroupCurrentMembersPanel">
            <div class="transport-panel-header">
              <div>
                <h2>组内成员列表</h2>
                <p>这里按成员展示 order_no、initiator、状态、联系方式、航班、行李、付款状态和可执行操作。</p>
              </div>
            </div>
            <div id="transportGroupCurrentMembers"></div>
          </section>

          <section class="admin-panel" id="transportGroupMembersPanel" hidden>
            <div class="transport-panel-header">
              <div>
                <h2>加入成员</h2>
              </div>
            </div>
            <form class="transport-inline-actions transport-force-assign" id="transportGroupForceAssignForm">
              <label class="field transport-quick-jump-field">
                <span>按订单编号加入</span>
                <input type="text" name="source_order_no" placeholder="输入 order_no" autocomplete="off">
              </label>
              <div class="admin-inline-actions">
                <button class="button button-secondary" type="submit">加入拼车组</button>
              </div>
            </form>
            <div id="transportGroupMembersList"></div>
            <div class="transport-card-actions">
              <button class="button button-secondary" id="transportGroupSaveMembersButton" type="button">保存成员变更</button>
            </div>
          </section>

          <section class="admin-panel transport-group-detail-panel" id="transportGroupDispatchSummaryPanel">
            <div class="transport-panel-header">
              <div>
                <h2>司机派单摘要</h2>
                <p>这里按当前拼车组信息自动整理给司机的派单摘要。</p>
              </div>
            </div>
            <div class="transport-group-dispatch-summary" id="transportGroupDispatchSummary"></div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <script src="./admin-api.js?v=20260416-group-edit-cleanup-2"></script>
  <script src="./admin-shell.js?v=20260416-group-edit-cleanup-2"></script>
  <script src="./transport-shared.js?v=20260416-group-edit-cleanup-2"></script>
  <script src="./transport-api.js?v=20260416-group-edit-cleanup-2"></script>
  <script src="./transport-admin.js?v=20260416-group-edit-cleanup-2"></script>
</body>
</html>
