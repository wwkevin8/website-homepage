<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#x540E;&#x53F0;&#x767B;&#x5F55; | NGN &#x7BA1;&#x7406;&#x540E;&#x53F0;</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="admin-entry-body">
  <main class="admin-entry-shell">
    <section class="admin-entry-card">
      <div class="admin-entry-copy">
        <p class="admin-eyebrow">NGN &#x7BA1;&#x7406;&#x540E;&#x53F0;</p>
        <h1>&#x540E;&#x53F0;&#x8D26;&#x53F7;&#x767B;&#x5F55;</h1>
        <p>&#x8BF7;&#x4F7F;&#x7528;&#x5DF2;&#x5206;&#x914D;&#x7684;&#x7BA1;&#x7406;&#x5458;&#x8D26;&#x53F7;&#x548C;&#x5BC6;&#x7801;&#x767B;&#x5F55;&#x540E;&#x53F0;&#x3002;&#x540E;&#x53F0;&#x8D26;&#x53F7;&#x72EC;&#x7ACB;&#x4E8E;&#x524D;&#x53F0;&#x7AD9;&#x70B9;&#x7528;&#x6237;&#x4F53;&#x7CFB;&#xFF0C;&#x4EC5;&#x7528;&#x4E8E;&#x5185;&#x90E8;&#x8FD0;&#x8425;&#x7BA1;&#x7406;&#x3002;</p>
      </div>

      <form class="admin-entry-form" id="adminLoginForm">
        <label class="field">
          <span>&#x8D26;&#x53F7;</span>
          <input type="text" name="username" autocomplete="username" required>
        </label>
        <label class="field">
          <span>&#x5BC6;&#x7801;</span>
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <div class="admin-entry-actions">
          <button class="button button-primary full-width" type="submit">&#x767B;&#x5F55;&#x540E;&#x53F0;</button>
        </div>
      </form>

      <p class="transport-form-message" id="adminLoginMessage"></p>
    </section>
  </main>
  <script src="./admin-api.js"></script>
  <script>
    (function () {
      const form = document.querySelector("#adminLoginForm");
      const message = document.querySelector("#adminLoginMessage");

      function show(text, isError) {
        if (!message) {
          return;
        }
        message.textContent = text || "";
        message.classList.toggle("is-error", Boolean(isError));
        message.classList.toggle("is-success", Boolean(text && !isError));
      }

      async function checkSession() {
        const session = await window.AdminApi.session().catch(() => ({
          authenticated: false
        }));

        if (session.authenticated) {
          const returnTo = new URLSearchParams(window.location.search).get("return_to");
          window.location.replace(returnTo || "./admin-dashboard.html");
        }
      }

      form?.addEventListener("submit", async event => {
        event.preventDefault();
        show("\u6b63\u5728\u767b\u5f55...");
        try {
          const session = await window.AdminApi.login(form.username.value, form.password.value);
          try {
            window.sessionStorage.setItem("ngn_admin_session_cache", JSON.stringify(session));
          } catch (error) {}
          const returnTo = new URLSearchParams(window.location.search).get("return_to");
          window.location.href = returnTo || "./admin-dashboard.html";
        } catch (error) {
          show(error.message || "\u767b\u5f55\u5931\u8d25", true);
        }
      });

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", checkSession);
      } else {
        checkSession();
      }
    })();
  </script>
</body>
</html>
