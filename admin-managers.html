<!DOCTYPE html>

<body

  data-admin-page="managers"

  <div class="admin-layout">
    <aside class="admin-sidebar" data-admin-sidebar></aside>
    <div class="admin-main">
      <header class="admin-header" data-admin-header></header>
      <main class="admin-content" data-admin-content>
        <section class="admin-page" id="adminManagersPage">
          <section class="admin-panel">
            <div class="admin-toolbar admin-toolbar-split">
              <form class="admin-toolbar admin-toolbar-inline" id="adminManagersFilters">
                <label class="field">
                  <span>&#x5173;&#x952E;&#x8BCD;</span>
                  <input type="text" name="keyword" placeholder="&#x8BF7;&#x8F93;&#x5165;&#x59D3;&#x540D;&#x3001;&#x8D26;&#x53F7;&#x3001;&#x90AE;&#x7BB1;&#x6216;&#x624B;&#x673A;&#x53F7;">
                </label>
                <label class="field">
                  <span>&#x89D2;&#x8272;</span>
                  <select name="role">
                    <option value="">&#x5168;&#x90E8;</option>
                    <option value="super_admin">&#x8D85;&#x7EA7;&#x7BA1;&#x7406;&#x5458;</option>
                    <option value="operations_admin">&#x8FD0;&#x8425;&#x7BA1;&#x7406;&#x5458;</option>
                  </select>
                </label>
                <label class="field">
                  <span>&#x72B6;&#x6001;</span>
                  <select name="status">
                    <option value="">&#x5168;&#x90E8;</option>
                    <option value="active">&#x542F;&#x7528;</option>
                    <option value="disabled">&#x505C;&#x7528;</option>
                  </select>
                </label>
                <div class="admin-inline-actions">
                  <button class="button button-primary" type="submit">&#x67E5;&#x8BE2;</button>
                  <button class="button button-secondary" type="reset">&#x91CD;&#x7F6E;</button>
                </div>
              </form>
              <div class="admin-inline-actions">
                <button class="button button-primary" id="adminCreateManagerButton" type="button">&#x65B0;&#x589E;&#x7BA1;&#x7406;&#x5458;</button>
              </div>
            </div>
          </section>
          <p class="transport-form-message" id="adminManagersMessage"></p>
          <section id="adminManagersTable"></section>
          <p class="admin-pagination" id="adminManagersPagination"></p>
        </section>
      </main>
    </div>
  </div>

  <div class="admin-overlay" id="adminManagerDrawer" hidden>
    <section class="admin-drawer" role="dialog" aria-modal="true" aria-labelledby="adminManagerDrawerTitle">
      <div class="admin-drawer-header">
        <div>
          <h2 id="adminManagerDrawerTitle">&#x65B0;&#x589E;&#x7BA1;&#x7406;&#x5458;</h2>
          <p id="adminManagerDrawerNote">&#x521B;&#x5EFA;&#x540E;&#x53F0;&#x7BA1;&#x7406;&#x5458;&#x8D26;&#x53F7;&#xFF0C;&#x5E76;&#x76F4;&#x63A5;&#x5206;&#x914D;&#x89D2;&#x8272;&#x3002;</p>
        </div>
        <button class="button button-text" type="button" data-admin-drawer-close>&#x5173;&#x95ED;</button>
      </div>
      <form class="admin-drawer-body admin-form-grid" id="adminManagerForm">
        <input type="hidden" name="id">
        <label class="field">
          <span>&#x59D3;&#x540D;</span>
          <input type="text" name="name" required>
        </label>
        <label class="field">
          <span>&#x8D26;&#x53F7;</span>
          <input type="text" name="username" required>
        </label>
        <label class="field">
          <span>&#x90AE;&#x7BB1;</span>
          <input type="email" name="email">
        </label>
        <label class="field">
          <span>&#x624B;&#x673A;&#x53F7;</span>
          <input type="text" name="phone">
        </label>
        <label class="field">
          <span>&#x89D2;&#x8272;</span>
          <select name="role">
            <option value="operations_admin">&#x8FD0;&#x8425;&#x7BA1;&#x7406;&#x5458;</option>
            <option value="super_admin">&#x8D85;&#x7EA7;&#x7BA1;&#x7406;&#x5458;</option>
          </select>
        </label>
        <label class="field">
          <span>&#x72B6;&#x6001;</span>
          <select name="status">
            <option value="active">&#x542F;&#x7528;</option>
            <option value="disabled">&#x505C;&#x7528;</option>
          </select>
        </label>
        <label class="field admin-field-span-2" id="adminManagerPasswordField">
          <span>&#x521D;&#x59CB;&#x5BC6;&#x7801;</span>
          <input type="password" name="password" minlength="8">
        </label>
        <div class="admin-inline-actions admin-field-span-2">
          <button class="button button-primary" type="submit">&#x4FDD;&#x5B58;</button>
          <button class="button button-secondary" type="button" data-admin-drawer-close>&#x53D6;&#x6D88;</button>
        </div>
      </form>
    </section>
  </div>

  <div class="admin-overlay" id="adminConfirmModal" hidden>
    <section class="admin-modal" role="dialog" aria-modal="true">
      <h2 data-confirm-title>&#x786E;&#x8BA4;&#x64CD;&#x4F5C;</h2>
      <p data-confirm-text>&#x8BF7;&#x786E;&#x8BA4;&#x540E;&#x7EE7;&#x7EED;&#x3002;</p>
      <div class="admin-inline-actions">
        <button class="button button-secondary" type="button" data-confirm-close>&#x53D6;&#x6D88;</button>
        <button class="button button-primary" type="button" data-confirm-submit>&#x786E;&#x8BA4;</button>
      </div>
    </section>
  </div>

  <script src="./admin-api.js"></script>
  <script src="./admin-shell.js"></script>
  <script src="./admin-pages.js"></script>
</body>
</html>
